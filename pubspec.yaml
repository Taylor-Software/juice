name: juice_oracle
description: "Loreseer — the oracle behind your adventure. A solo-RPG oracle & campaign journal implementing the Juice oracle (jrruethe/juice)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  flutter_riverpod: ^2.5.1
  flutter_gemma: ^0.16.5
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3
  archive: ^4.0.9
  pdfrx: ^2.4.4
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Bundled OFL variable fonts (Newsreader serif = narrative, Hanken Grotesk
  # sans = UI). Variable fonts honor FontWeight via the wght axis at runtime, so
  # one asset per family suffices (Newsreader ships a separate italic file).
  fonts:
    - family: Newsreader
      fonts:
        - asset: assets/fonts/newsreader/Newsreader.ttf
        - asset: assets/fonts/newsreader/Newsreader-Italic.ttf
          style: italic
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/hanken/HankenGrotesk.ttf
  assets:
    - assets/oracle_data.json
    - assets/emulator_data.json
    - assets/help_data.json
    - assets/verdant_data.json
    - assets/lonelog_data.json
    - assets/hexcrawl_data.json
    - assets/ruleset_starforged.json
    - assets/ruleset_classic.json
    - assets/ruleset_delve.json
    - assets/ruleset_sundered_isles.json
    - assets/abstract_icons/
    - assets/tarot/
    - assets/playing/

# App icon: the "eye-in-open-book" mark (gold eye + open book on indigo). The
# source of truth is build_app_icon.py, which renders the editable vector
# assets/icon/app_icon.svg + the 1024 raster assets/icon/app_icon.png and all
# platform assets (deps: cairosvg + Pillow, not part of the Dart stack). The
# full-bleed PNG also feeds `dart run flutter_launcher_icons` (config below);
# each OS applies its own mask, so Android uses the legacy full-bleed icon
# rather than an adaptive fg/bg split.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FDF6F0"
    theme_color: "#B8540E"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
