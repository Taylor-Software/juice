name: juice_oracle
description: A solo-RPG oracle app implementing the Juice oracle (jrruethe/juice).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  flutter_riverpod: ^2.5.1
  flutter_gemma: ^0.16.5
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/oracle_data.json
    - assets/emulator_data.json
    - assets/help_data.json
    - assets/ruleset_starforged.json
    - assets/ruleset_classic.json
    - assets/ruleset_delve.json
    - assets/ruleset_sundered_isles.json
    - assets/abstract_icons/
